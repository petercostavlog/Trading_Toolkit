<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David's Dino Masterclass! 🦕</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#060e06; --green:#52b788; --lime:#7bed9f; --amber:#ffc107;
    --fire:#ff6b35; --bone:#e8d5b0; --red:#f72585; --sky:#90e0ef;
    --purple:#c77dff; --card:rgba(255,255,255,0.05); --border:rgba(255,255,255,0.1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;z-index:0;
    background:radial-gradient(ellipse at 15% 20%,rgba(82,183,136,.12) 0%,transparent 50%),
    radial-gradient(ellipse at 85% 80%,rgba(255,107,53,.10) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%,#060e06 0%,#020802 100%);}
  .floaters{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .floaters span{position:absolute;opacity:.055;animation:floatUp linear infinite;}
  @keyframes floatUp{0%{transform:translateY(105vh) rotate(0deg);opacity:0}5%{opacity:.055}95%{opacity:.055}100%{transform:translateY(-5vh) rotate(25deg);opacity:0}}

  .wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:16px 14px 70px;}

  /* HEADER */
  .hdr{text-align:center;margin-bottom:20px;animation:dropIn .6s cubic-bezier(.34,1.56,.64,1) both;}
  @keyframes dropIn{from{transform:translateY(-44px);opacity:0}to{transform:translateY(0);opacity:1}}
  .hdr-badge{display:inline-block;background:rgba(123,237,159,.1);border:1.5px solid rgba(123,237,159,.3);border-radius:50px;padding:5px 16px;font-size:.78rem;font-weight:800;color:var(--lime);letter-spacing:.5px;margin-bottom:8px;}
  .hdr h1{font-family:'Boogaloo',cursive;font-size:clamp(2rem,6vw,3.2rem);color:var(--amber);text-shadow:2px 2px 0 #5a3800,0 0 30px rgba(255,193,7,.2);}
  .hdr p{color:rgba(255,255,255,.4);font-weight:700;font-size:.88rem;margin-top:5px;}

  /* TABS */
  .tabs{display:flex;gap:10px;margin-bottom:20px;animation:dropIn .5s .08s cubic-bezier(.34,1.56,.64,1) both;}
  .tab{flex:1;padding:11px 6px;background:var(--card);border:2px solid var(--border);border-radius:16px;font-family:'Boogaloo',cursive;font-size:.92rem;color:rgba(255,255,255,.3);cursor:pointer;transition:all .2s;text-align:center;}
  .tab.active{background:rgba(255,193,7,.12);border-color:var(--amber);color:var(--amber);box-shadow:0 0 16px rgba(255,193,7,.15);}
  .tab:hover:not(.active){background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);}

  /* CHAPTER DOTS */
  .ch-dots{display:flex;justify-content:center;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .cdot{width:36px;height:36px;border-radius:50%;background:var(--card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;transition:all .25s;}
  .cdot.active{background:rgba(255,193,7,.2);border-color:var(--amber);transform:scale(1.2);box-shadow:0 0 12px rgba(255,193,7,.3);}
  .cdot.done{background:rgba(123,237,159,.15);border-color:var(--lime);}

  /* CHAPTER CARD */
  .ch-card{border-radius:26px;padding:28px 22px 22px;background:var(--card);border:2px solid rgba(123,237,159,.2);backdrop-filter:blur(8px);animation:cardIn .45s cubic-bezier(.34,1.56,.64,1) both;margin-bottom:14px;}
  @keyframes cardIn{from{transform:scale(.9) translateY(12px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
  .ch-num{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:rgba(255,193,7,.55);margin-bottom:8px;}
  .ch-title{font-family:'Boogaloo',cursive;font-size:clamp(1.5rem,4.5vw,2.1rem);color:var(--amber);margin-bottom:4px;text-shadow:1px 1px 0 #5a3800;}
  .ch-emoji{font-size:3.5rem;display:block;text-align:center;margin:14px 0;animation:sway 3s ease-in-out infinite;}
  @keyframes sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}

  .story{font-size:.95rem;color:rgba(255,255,255,.85);line-height:1.8;font-weight:600;margin-bottom:16px;}
  .story strong{color:var(--amber);font-weight:900;}
  .story em{color:var(--bone);font-style:normal;font-weight:800;}

  .facts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .fbox{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:16px;padding:14px 12px;}
  .fbox .fi{font-size:1.8rem;display:block;margin-bottom:6px;}
  .fbox .ft{font-family:'Boogaloo',cursive;font-size:.95rem;color:var(--amber);margin-bottom:4px;}
  .fbox .fd{font-size:.78rem;color:rgba(255,255,255,.65);font-weight:700;line-height:1.5;}

  .wow{background:rgba(255,107,53,.08);border:1.5px dashed rgba(255,107,53,.3);border-radius:14px;padding:13px 16px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;}
  .wow .wi{font-size:1.4rem;flex-shrink:0;}
  .wow .wt{font-size:.82rem;color:#ffb08a;font-weight:700;line-height:1.55;}
  .wow .wt strong{color:var(--fire);}

  .dino-table{width:100%;border-collapse:collapse;margin-bottom:16px;}
  .dino-table th{background:rgba(255,193,7,.12);color:var(--amber);font-family:'Boogaloo',cursive;font-size:.85rem;padding:10px 8px;text-align:left;border-bottom:1.5px solid rgba(255,193,7,.2);}
  .dino-table td{font-size:.78rem;color:rgba(255,255,255,.8);font-weight:700;padding:9px 8px;border-bottom:1px solid rgba(255,255,255,.06);line-height:1.4;}
  .dino-table tr:hover td{background:rgba(255,255,255,.03);}

  .timeline{display:flex;align-items:stretch;gap:0;margin:16px 0;overflow-x:auto;padding-bottom:4px;}
  .tl-item{display:flex;flex-direction:column;align-items:center;min-width:100px;}
  .tl-dot{width:38px;height:38px;border-radius:50%;border:3px solid;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;margin-bottom:8px;}
  .tl-label{font-size:.68rem;font-weight:800;text-align:center;line-height:1.3;}
  .tl-line{flex:1;height:3px;background:rgba(196,168,130,.2);margin-top:17px;min-width:20px;}

  .ch-nav{display:flex;gap:10px;margin-top:4px;}
  .ch-btn{flex:1;padding:13px;border:none;border-radius:50px;font-family:'Boogaloo',cursive;font-size:1.05rem;cursor:pointer;transition:all .2s;}
  .ch-prev{background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);border:2px solid var(--border);}
  .ch-prev:hover{background:rgba(255,255,255,.12);color:white;}
  .ch-next{background:linear-gradient(135deg,var(--amber),var(--fire));color:#060e06;box-shadow:0 4px 16px rgba(255,193,7,.3);}
  .ch-next:hover{transform:translateY(-2px);}
  .ch-quiz{background:linear-gradient(135deg,var(--lime),var(--green));color:#060e06;box-shadow:0 4px 16px rgba(123,237,159,.3);}
  .ch-quiz:hover{transform:translateY(-2px);}

  /* QUIZ */
  #quizPhase{display:none;}
  .q-hud{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
  .qhb{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:10px 6px;text-align:center;}
  .qhb .qhv{font-family:'Boogaloo',cursive;font-size:1.35rem;color:white;display:block;}
  .qhb .qhl{font-size:.62rem;color:rgba(255,255,255,.35);font-weight:800;text-transform:uppercase;}

  .prog-wrap{height:8px;background:rgba(255,255,255,.08);border-radius:8px;margin-bottom:18px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--lime),var(--amber));transition:width .5s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 10px rgba(123,237,159,.4);}

  .q-card{border-radius:26px;padding:26px 22px 22px;background:var(--card);border:2px solid var(--border);backdrop-filter:blur(8px);animation:cardIn .45s cubic-bezier(.34,1.56,.64,1) both;margin-bottom:14px;}
  .q-top{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .q-tag{display:inline-block;padding:4px 12px;border-radius:50px;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;border:1.5px solid;}
  .q-type-pill{display:inline-block;padding:3px 10px;border-radius:50px;font-size:.65rem;font-weight:800;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.45);}
  .q-emoji-big{font-size:3rem;display:block;text-align:center;margin-bottom:10px;animation:sway 3s ease-in-out infinite;}
  .q-text{font-family:'Boogaloo',cursive;font-size:clamp(1.1rem,3.5vw,1.45rem);color:white;text-align:center;line-height:1.35;margin-bottom:8px;}
  .q-sub{font-size:.8rem;color:rgba(255,255,255,.4);text-align:center;font-weight:700;margin-bottom:14px;line-height:1.5;font-style:italic;}

  .hint-box{background:rgba(255,193,7,.07);border:1.5px dashed rgba(255,193,7,.25);border-radius:12px;padding:9px 14px;margin-bottom:14px;font-size:.8rem;color:rgba(255,193,7,.7);font-weight:700;text-align:center;cursor:pointer;transition:all .2s;}
  .hint-box:hover{background:rgba(255,193,7,.12);}
  .hint-box.shown{cursor:default;color:var(--amber);border-style:solid;}

  .opts-4{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .opts-6{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .opt{background:rgba(255,255,255,.06);border:2px solid var(--border);border-radius:14px;padding:13px 8px;cursor:pointer;transition:all .18s;font-family:'Nunito',sans-serif;font-size:.84rem;font-weight:800;color:white;text-align:center;line-height:1.3;}
  .opt:hover:not(:disabled){background:rgba(82,183,136,.12);border-color:rgba(82,183,136,.4);transform:scale(1.03);}
  .opt.correct{background:rgba(123,237,159,.22)!important;border-color:var(--lime)!important;animation:pop .35s cubic-bezier(.34,1.56,.64,1);}
  .opt.wrong{background:rgba(247,37,133,.15)!important;border-color:var(--red)!important;animation:shk .3s ease;}
  @keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  @keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

  .type-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .type-input{width:100%;max-width:400px;padding:14px 18px;background:rgba(255,255,255,.07);border:2.5px solid rgba(255,255,255,.18);border-radius:16px;font-family:'Boogaloo',cursive;font-size:1.4rem;color:white;text-align:center;outline:none;transition:all .2s;caret-color:var(--amber);}
  .type-input::placeholder{color:rgba(255,255,255,.22);font-size:1rem;}
  .type-input:focus{border-color:rgba(255,193,7,.6);box-shadow:0 0 20px rgba(255,193,7,.15);}
  .type-input.ok-in{border-color:var(--lime);background:rgba(123,237,159,.08);}
  .type-input.err-in{border-color:var(--red);background:rgba(247,37,133,.07);}
  .submit-btn{padding:13px 34px;border:none;border-radius:50px;font-family:'Boogaloo',cursive;font-size:1.1rem;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,var(--amber),var(--fire));color:#060e06;box-shadow:0 4px 16px rgba(255,193,7,.3);}
  .submit-btn:hover{transform:translateY(-2px);}
  .submit-btn:disabled{opacity:.4;cursor:default;transform:none;}

  .fb{border-radius:13px;padding:13px 16px;margin-top:13px;font-weight:700;font-size:.88rem;line-height:1.55;animation:fadeUp .3s ease both;display:none;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  .fb.ok{background:rgba(123,237,159,.1);border:1.5px solid var(--lime);color:#b7f5c8;}
  .fb.err{background:rgba(247,37,133,.08);border:1.5px solid var(--red);color:#ffaacc;}

  .next-btn{display:none;width:100%;margin-top:12px;padding:14px;border:none;border-radius:50px;cursor:pointer;transition:all .2s;font-family:'Boogaloo',cursive;font-size:1.15rem;color:#060e06;background:linear-gradient(135deg,var(--amber),var(--fire));box-shadow:0 4px 16px rgba(255,193,7,.3);}
  .next-btn:hover{transform:translateY(-2px);}

  /* RESULTS */
  #resultsSection{display:none;text-align:center;animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) both;}
  .r-trophy{font-size:5.5rem;display:block;margin-bottom:12px;animation:bounce 1.5s ease-in-out infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  .r-title{font-family:'Boogaloo',cursive;font-size:clamp(1.8rem,5vw,2.8rem);color:var(--amber);text-shadow:2px 2px 0 #5a3800;margin-bottom:6px;}
  .r-sub{color:rgba(255,255,255,.5);font-weight:700;font-size:.95rem;margin-bottom:18px;}
  .r-stars{font-size:2rem;letter-spacing:6px;margin-bottom:18px;}
  .facts-learned{background:var(--card);border:1.5px solid rgba(255,193,7,.2);border-radius:18px;padding:16px;margin-bottom:16px;text-align:left;}
  .facts-learned h3{font-family:'Boogaloo',cursive;color:var(--amber);font-size:1rem;margin-bottom:12px;}
  .fl-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;font-size:.82rem;color:rgba(255,255,255,.8);font-weight:700;line-height:1.45;}
  .ml-box{background:rgba(255,255,255,.03);border:1.5px solid rgba(144,224,239,.15);border-radius:14px;padding:13px 16px;margin-bottom:16px;font-size:.83rem;text-align:left;}
  .ml-box p{margin-bottom:5px;line-height:1.55;}
  .ml-box .en{color:var(--amber);font-weight:800;}
  .ml-box .ro{color:var(--lime);font-weight:800;}
  .ml-box .es{color:var(--sky);font-weight:800;}
  .r-btns{display:flex;gap:10px;}
  .r-btn{flex:1;padding:14px;border:none;border-radius:50px;font-family:'Boogaloo',cursive;font-size:1.1rem;cursor:pointer;transition:all .2s;color:#060e06;}
  .r-btn-learn{background:rgba(255,255,255,.08);color:white;border:2px solid var(--border);}
  .r-btn-learn:hover{background:rgba(255,255,255,.13);}
  .r-btn-quiz{background:linear-gradient(135deg,var(--lime),var(--green));box-shadow:0 4px 16px rgba(123,237,159,.3);}
  .r-btn-quiz:hover{transform:scale(1.03);}

  .cp{position:fixed;width:9px;height:9px;top:-9px;border-radius:2px;animation:cf linear forwards;z-index:999;pointer-events:none;}
  @keyframes cf{to{transform:translateY(106vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>
<div class="floaters" id="floaters"></div>
<div class="wrap">

  <div class="hdr">
    <div class="hdr-badge">🦕 DINO MASTERCLASS — LEARN + QUIZ</div>
    <h1>Dinosaur Masterclass! 🦖</h1>
    <p>Read all 6 chapters → then take the big quiz! 📖➡️🧠</p>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabLearn" onclick="goLearn()">📖 Learn</button>
    <button class="tab"        id="tabQuiz"  onclick="goQuiz()">⚡ Quiz Me!</button>
  </div>

  <!-- LEARN -->
  <div id="learnPhase">
    <div class="ch-dots" id="chDots"></div>
    <div id="chArea"></div>
  </div>

  <!-- QUIZ -->
  <div id="quizPhase">
    <div class="q-hud">
      <div class="qhb"><span class="qhv" id="qhScore">0</span><span class="qhl">⭐ Score</span></div>
      <div class="qhb"><span class="qhv" id="qhStreak">0🔥</span><span class="qhl">Streak</span></div>
      <div class="qhb"><span class="qhv" id="qhNum">1/20</span><span class="qhl">Question</span></div>
    </div>
    <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="q-card" id="qCard">
      <div class="q-top">
        <span class="q-tag" id="qTag" style="color:var(--amber);border-color:var(--amber)55;background:var(--amber)12">🦕 Dinosaurs</span>
        <span class="q-type-pill" id="qTypePill">CHOOSE</span>
      </div>
      <span class="q-emoji-big" id="qEmoji">🦕</span>
      <div class="q-text" id="qText">Loading…</div>
      <div class="q-sub"  id="qSub"></div>
      <div class="hint-box" id="hintBox" onclick="showHint()">💡 Tap for a hint</div>
      <div id="answerArea"></div>
      <div class="fb" id="fb"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQ()">Next ➡️</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="resultsSection">
    <span class="r-trophy" id="rTrophy">🏆</span>
    <div class="r-title" id="rTitle">Amazing, David!</div>
    <div class="r-sub"   id="rSub"></div>
    <div class="r-stars" id="rStars"></div>
    <div class="facts-learned">
      <h3>🦕 Everything you learned today:</h3>
      <div id="flList"></div>
    </div>
    <div class="ml-box" id="rMl"></div>
    <div class="r-btns">
      <button class="r-btn r-btn-learn" onclick="goLearn()">📖 Review Lesson</button>
      <button class="r-btn r-btn-quiz"  onclick="goQuiz()">🔄 Try Quiz Again!</button>
    </div>
  </div>

</div>
<script>
// ═══════════════════════════════════════════════
//  CHAPTERS
// ═══════════════════════════════════════════════
const chapters = [
  {
    emoji:'⏳', title:'When Did Dinosaurs Live?',
    content:`
      <p class="story">Dinosaurs lived during a time called the <strong>Mesozoic Era</strong> — which is split into
      three amazing periods. They first appeared about <strong>230 million years ago</strong> and ruled the Earth
      for an incredible <em>165 million years!</em></p>
      <div class="timeline">
        <div class="tl-item">
          <div class="tl-dot" style="border-color:#ff6b35;background:rgba(255,107,53,.15)">🌋</div>
          <div class="tl-label" style="color:#ff6b35">Triassic<br><span style="font-size:.6rem;color:rgba(255,255,255,.35)">252–201M BC<br>First dinosaurs!</span></div>
        </div><div class="tl-line"></div>
        <div class="tl-item">
          <div class="tl-dot" style="border-color:#ffc107;background:rgba(255,193,7,.15)">🦕</div>
          <div class="tl-label" style="color:#ffc107">Jurassic<br><span style="font-size:.6rem;color:rgba(255,255,255,.35)">201–145M BC<br>Giants!</span></div>
        </div><div class="tl-line"></div>
        <div class="tl-item">
          <div class="tl-dot" style="border-color:#7bed9f;background:rgba(123,237,159,.15)">🦖</div>
          <div class="tl-label" style="color:#7bed9f">Cretaceous<br><span style="font-size:.6rem;color:rgba(255,255,255,.35)">145–66M BC<br>T-Rex era!</span></div>
        </div><div class="tl-line"></div>
        <div class="tl-item">
          <div class="tl-dot" style="border-color:#f72585;background:rgba(247,37,133,.15)">☄️</div>
          <div class="tl-label" style="color:#f72585">Extinction<br><span style="font-size:.6rem;color:rgba(255,255,255,.35)">66M BC<br>Asteroid!</span></div>
        </div>
      </div>
      <div class="wow"><span class="wi">🤯</span><div class="wt">T-Rex and Stegosaurus <strong>NEVER MET</strong> — they lived <strong>79 million years apart!</strong> That's more time between them than between T-Rex and YOU today!</div></div>`,
    facts:['Dinosaurs first appeared 230 million years ago in the Triassic period','There are 3 periods: Triassic → Jurassic → Cretaceous','T-Rex and Stegosaurus lived 79 million years apart — they never met!','Dinosaurs ruled Earth for 165 million years']
  },
  {
    emoji:'🦕', title:'Famous Dinosaurs — Meet the Giants!',
    content:`
      <p class="story">There were <strong>over 1,000 species</strong> of dinosaur! Here are some of the most
      amazing ones you should know about:</p>
      <table class="dino-table">
        <tr><th>Dinosaur</th><th>Period</th><th>Diet</th><th>Cool Fact</th></tr>
        <tr><td>🦖 <strong>T-Rex</strong></td><td>Cretaceous</td><td>🥩 Carnivore</td><td>Bite force 4× stronger than a lion!</td></tr>
        <tr><td>🦕 <strong>Brachiosaurus</strong></td><td>Jurassic</td><td>🌿 Herbivore</td><td>Neck 9 metres long — taller than 2 giraffes!</td></tr>
        <tr><td>⚔️ <strong>Triceratops</strong></td><td>Cretaceous</td><td>🌿 Herbivore</td><td>3 horns — TRI means three in Latin!</td></tr>
        <tr><td>🛡️ <strong>Stegosaurus</strong></td><td>Jurassic</td><td>🌿 Herbivore</td><td>Brain the size of a walnut! 🥜</td></tr>
        <tr><td>🦅 <strong>Velociraptor</strong></td><td>Cretaceous</td><td>🥩 Carnivore</td><td>Had feathers — only turkey-sized in real life!</td></tr>

function buildDots(){
  const dc=document.getElementById('chDots'); dc.innerHTML='';
  chapters.forEach((ch,i)=>{
    const d=document.createElement('div');
    d.className='cdot'+(i===chIdx?' active':seenChs.has(i)?' done':'');
    d.textContent=ch.emoji;
    d.onclick=()=>{chIdx=i;seenChs.add(i);buildDots();renderCh();};
    dc.appendChild(d);
  });
}

function renderCh(){
  const ch=chapters[chIdx];
  const isLast=chIdx===chapters.length-1;
  const area=document.getElementById('chArea');
  area.innerHTML=`<div class="ch-card" id="chCard">
    <div class="ch-num">Chapter ${chIdx+1} of ${chapters.length}</div>
    <div class="ch-title">${ch.emoji} ${ch.title}</div>
    ${ch.content}
    <div class="ch-nav">
      ${chIdx>0?`<button class="ch-btn ch-prev" onclick="moveCh(-1)">⬅️ Back</button>`:''}
      ${!isLast
        ?`<button class="ch-btn ch-next" onclick="moveCh(1)">Next Chapter ➡️</button>`
        :`<button class="ch-btn ch-quiz" onclick="goQuiz()">⚡ Ready — Quiz me!</button>`}
    </div>
  </div>`;
  const card=document.getElementById('chCard');
  card.style.animation='none'; void card.offsetWidth; card.style.animation='cardIn .45s cubic-bezier(.34,1.56,.64,1) both';
  window.scrollTo({top:0,behavior:'smooth'});
}

function moveCh(dir){
  chIdx=Math.max(0,Math.min(chapters.length-1,chIdx+dir));
  seenChs.add(chIdx); buildDots(); renderCh();
}

  document.getElementById('learnPhase').style.display='block';

  document.getElementById('resultsSection').style.display='none';
  document.getElementById('tabLearn').classList.add('active');
  document.getElementById('tabQuiz').classList.remove('active');
}

  document.getElementById('tabQuiz').classList.add('active');
  qIdx=0; score=0; streak=0; bestStreak=0; answered=false; hintShown=false;
  document.getElementById('qhScore').textContent='0';
  document.getElementById('qhStreak').textContent='0🔥';
  renderQ();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderQ(){
  answered=false; hintShown=false;
  const q=questions[qIdx];
  document.getElementById('qhNum').textContent=`${qIdx+1}/${questions.length}`;
  document.getElementById('progFill').style.width=((qIdx/questions.length)*100)+'%';
  document.getElementById('qTypePill').textContent=q.type==='type'?'⌨️ TYPE IT':'🖱️ CHOOSE';
  document.getElementById('qEmoji').textContent=q.e;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('qSub').textContent=q.sub||'';

  const tag=document.getElementById('qTag');
  tag.textContent=q.cat; tag.style.color=q.col; tag.style.borderColor=q.col+'55'; tag.style.background=q.col+'12';

  document.getElementById('fb').style.display='none';
  document.getElementById('nextBtn').style.display='none';
  const hb=document.getElementById('hintBox'); hb.className='hint-box'; hb.textContent='💡 Tap for a hint';

  const aa=document.getElementById('answerArea'); aa.innerHTML='';
  if(q.type==='type'){
    aa.innerHTML=`<div class="type-wrap">
      <input class="type-input" id="typeIn" placeholder="Type your answer…" autocomplete="off" spellcheck="false"/>
      <button class="submit-btn" id="subBtn" onclick="submitType()">✅ Check Answer</button>
    </div>`;
    const inp=document.getElementById('typeIn');
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')submitType();});
    setTimeout(()=>inp.focus(),100);
  } else {
    const grid=document.createElement('div');
    grid.className=q.type==='pick6'?'opts-6':'opts-4';
    q.opts.forEach((opt,i)=>{
      const btn=document.createElement('button'); btn.className='opt'; btn.textContent=opt;
      btn.onclick=()=>pickOpt(i,btn); grid.appendChild(btn);
    });
    aa.appendChild(grid);
  }
  const card=document.getElementById('qCard');
  card.style.animation='none'; void card.offsetWidth; card.style.animation='cardIn .45s cubic-bezier(.34,1.56,.64,1) both';
}

function showHint(){
  if(hintShown||answered)return;
  hintShown=true;
  const hb=document.getElementById('hintBox');
  hb.className='hint-box shown'; hb.textContent='💡 Hint: '+questions[qIdx].hint;
}

function submitType(){
  if(answered)return;
  const inp=document.getElementById('typeIn'), val=inp.value.trim().toLowerCase();
  if(!val){inp.focus();return;}
  const q=questions[qIdx];
  const correct=q.accept.some(a=>val===a.toLowerCase());
  inp.disabled=true; document.getElementById('subBtn').disabled=true;
  inp.className='type-input '+(correct?'ok-in':'err-in');
  processAns(correct,q);
}

function pickOpt(chosen,btn){
  if(answered)return;
  const q=questions[qIdx];
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const correct=chosen===q.c;
  if(correct) btn.classList.add('correct');
  else { btn.classList.add('wrong'); document.querySelectorAll('.opt')[q.c].classList.add('correct'); }
  processAns(correct,q);
}

function processAns(correct,q){
  answered=true;
  const fb=document.getElementById('fb'); fb.style.display='block';
  if(correct){
    const pts=10+(streak>=2?5:0)+(!hintShown?3:0);
    score+=pts; streak++; if(streak>bestStreak)bestStreak=streak;
    document.getElementById('qhScore').textContent=score;
    document.getElementById('qhStreak').textContent=streak+'🔥';
    fb.className='fb ok';
    fb.textContent=q.ok+(streak>=3?` 🔥 ${streak} in a row!`:'')+(!hintShown?' ⭐ No-hint bonus!':'');
  } else {
    streak=0; document.getElementById('qhStreak').textContent='0🔥';
    fb.className='fb err'; fb.textContent=q.err;
  }
  document.getElementById('nextBtn').style.display='block';
}

function nextQ(){
  qIdx++;
  if(qIdx>=questions.length) showResults();
  else renderQ();
}

// ── RESULTS ───────────────────────────────────
function showResults(){
  document.getElementById('quizPhase').style.display='none';
  document.getElementById('resultsSection').style.display='block';
  document.getElementById('progFill').style.width='100%';

  const correct=questions.filter((_,i)=>i<qIdx).length; // approx — tracked via score
  const pct=score/(questions.length*13); // max ~13pts per q with bonuses
  const rawPct = score / (questions.length * 10);

  let trophy,title,sub;
  if(rawPct>=1)      {trophy='🏆';title='PERFECT, David!';sub=`${score} points! Every single question right — you ARE the Dinosaur Masterclass champion! 🦕👑`;}
  else if(rawPct>=.8){trophy='🥇';title='Dino Expert, David!';sub=`${score} points! Outstanding knowledge across ALL topics — time periods, bodies, extinction and more! 🔥`;}
  else if(rawPct>=.6){trophy='🥈';title='Brilliant work, David!';sub=`${score} points! Really impressive dino knowledge! Go over the chapters and try again! 💪`;}
  else if(rawPct>=.4){trophy='🦕';title='Good effort, David!';sub=`${score} points! Re-read the lesson and try again — you\'ll smash it! 🚀`;}
  else               {trophy='🦴';title='Keep going, David!';sub=`${score} points! Read every chapter carefully first, then try the quiz. You can do it! 💪`;}

  document.getElementById('rTrophy').textContent=trophy;
  document.getElementById('rTitle').textContent=title;
  document.getElementById('rSub').textContent=sub;
  document.getElementById('rStars').textContent=rawPct>=1?'⭐⭐⭐⭐⭐':rawPct>=.8?'⭐⭐⭐⭐':rawPct>=.6?'⭐⭐⭐':rawPct>=.4?'⭐⭐':'⭐';

  const fl2=document.getElementById('flList'); fl2.innerHTML='';
  chapters.forEach(ch=>{
    ch.facts.forEach(f=>{
      const d=document.createElement('div'); d.className='fl-row';
      d.innerHTML=`<span style="font-size:.9rem;flex-shrink:0">🦕</span><span>${f}</span>`; fl2.appendChild(d);
    });
  });

  const ml=document.getElementById('rMl');
  if(rawPct>=.7){
    ml.innerHTML=`
      <p class="en">🇬🇧 Incredible, David! Time periods, diets, bodies, evolution, extinction — you know it ALL! 🦕👑</p>
      <p class="ro">🇷🇴 Incredibil, David! Perioade, diete, corpuri, evoluție, extincție — ești un expert total în dinozauri! 🌟</p>
      <p class="es">🇪🇸 ¡Increíble, David! ¡Períodos, dietas, cuerpos, evolución, extinción — eres el campeón de los dinosaurios! 🏆</p>`;
  } else {
    ml.innerHTML=`
      <p class="en">🇬🇧 Good effort, David! Read the chapters again carefully then retake the quiz — you\'ll do much better! 💪</p>
      <p class="ro">🇷🇴 Efort bun, David! Recitește capitolele cu atenție și încearcă din nou — vei reuși! 📚</p>
      <p class="es">🇪🇸 ¡Buen esfuerzo, David! ¡Vuelve a leer los capítulos e inténtalo de nuevo! 🔄</p>`;
  }
  if(rawPct>=.6) launchConfetti();
  window.scrollTo({top:0,behavior:'smooth'});
}

function launchConfetti(){
  const cols=['#ffc107','#7bed9f','#ff6b35','#f72585','#90e0ef','#c77dff','#e8d5b0'];
  for(let i=0;i<90;i++){setTimeout(()=>{const c=document.createElement('div');c.className='cp';c.style.left=(Math.random()*100)+'vw';c.style.background=cols[Math.floor(Math.random()*cols.length)];c.style.animationDuration=(1.5+Math.random()*2.5)+'s';c.style.animationDelay=(Math.random()*.4)+'s';c.style.borderRadius=Math.random()>.5?'50%':'2px';document.body.appendChild(c);setTimeout(()=>c.remove(),3500);},i*20);}
}

// INIT
buildDots(); renderCh();
</script>
