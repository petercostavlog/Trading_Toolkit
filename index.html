<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Toolkit — Costache Hub</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0b0f;
    --bg-secondary: #12131a;
    --bg-card: #181922;
    --bg-card-hover: #1e2030;
    --bg-input: #0e0f15;
    --border: #252738;
    --border-hover: #3a3d56;
    --text-primary: #e8e9f0;
    --text-secondary: #8b8fa4;
    --text-muted: #555874;
    --accent-blue: #5c9cf2;
    --accent-blue-dim: rgba(92, 156, 242, 0.12);
    --accent-pink: #f472b6;
    --accent-pink-dim: rgba(244, 114, 182, 0.12);
    --accent-green: #3dd68c;
    --accent-green-dim: rgba(61, 214, 140, 0.12);
    --accent-gold: #BEA064;
    --accent-gold-dim: rgba(190, 160, 100, 0.15);
    --accent-red: #f25f5c;
    --accent-red-dim: rgba(242, 95, 92, 0.12);
    --accent-purple: #a78bfa;
    --accent-purple-dim: rgba(167, 139, 250, 0.12);
    --accent-cyan: #22d3ee;
    --accent-cyan-dim: rgba(34, 211, 238, 0.12);
    --accent-orange: #f59e0b;
    --accent-orange-dim: rgba(245, 158, 11, 0.12);
    --radius: 14px;
    --radius-sm: 10px;
    --radius-lg: 20px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; top: -40%; left: -20%;
    width: 80vw; height: 80vh;
    background: radial-gradient(ellipse, rgba(92,156,242,0.03) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ── */
  .header {
    position: relative; z-index: 1;
    padding: 32px 48px 20px;
    display: flex; align-items: flex-end; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .header-left h1 {
    font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
    color: var(--text-primary);
  }
  .header-left h1 span { opacity: 0.4; font-weight: 400; }
  .header-left p {
    color: var(--text-secondary); font-size: 13px;
    font-family: 'JetBrains Mono', monospace; margin-top: 2px;
  }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .clock {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--text-muted);
    background: var(--bg-card); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: var(--radius-sm);
  }

  /* ── BREADCRUMB ── */
  .breadcrumb {
    position: relative; z-index: 1;
    padding: 16px 48px;
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .crumb {
    color: var(--text-muted); cursor: pointer; transition: color 0.2s;
    text-decoration: none; background: none; border: none;
    font-family: inherit; font-size: inherit;
  }
  .crumb:hover { color: var(--text-primary); }
  .crumb.active { color: var(--text-secondary); cursor: default; }
  .crumb-sep { color: var(--text-muted); opacity: 0.4; }

  /* ── MAIN CONTAINER ── */
  .main {
    position: relative; z-index: 1;
    padding: 8px 48px 60px;
  }

  /* ── PROFILE SELECT SCREEN ── */
  .profiles-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 800px;
    margin: 60px auto;
    animation: fadeUp 0.4s ease both;
  }
  .profile-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .profile-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    opacity: 0; transition: opacity 0.3s;
  }
  .profile-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow);
  }
  .profile-card:hover::before { opacity: 1; }
  .profile-avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; margin: 0 auto 16px;
    border: 3px solid var(--border);
    transition: border-color 0.3s;
  }
  .profile-card:hover .profile-avatar { border-color: inherit; }
  .profile-name {
    font-size: 22px; font-weight: 700; margin-bottom: 4px;
  }
  .profile-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-muted);
  }

  /* Profile colours */
  .profile-catalin { border-color: rgba(92,156,242,0.25); }
  .profile-catalin:hover { border-color: var(--accent-blue); background: rgba(92,156,242,0.05); }
  .profile-catalin::before { background: linear-gradient(90deg, var(--accent-blue), transparent); }
  .profile-catalin .profile-avatar { border-color: rgba(92,156,242,0.3); }
  .profile-catalin:hover .profile-avatar { border-color: var(--accent-blue); }
  .profile-catalin .profile-name { color: var(--accent-blue); }

  .profile-ionela { border-color: rgba(244,114,182,0.25); }
  .profile-ionela:hover { border-color: var(--accent-pink); background: rgba(244,114,182,0.05); }
  .profile-ionela::before { background: linear-gradient(90deg, var(--accent-pink), transparent); }
  .profile-ionela .profile-avatar { border-color: rgba(244,114,182,0.3); }
  .profile-ionela:hover .profile-avatar { border-color: var(--accent-pink); }
  .profile-ionela .profile-name { color: var(--accent-pink); }

  .profile-david { border-color: rgba(61,214,140,0.25); }
  .profile-david:hover { border-color: var(--accent-green); background: rgba(61,214,140,0.05); }
  .profile-david::before { background: linear-gradient(90deg, var(--accent-green), transparent); }
  .profile-david .profile-avatar { border-color: rgba(61,214,140,0.3); }
  .profile-david:hover .profile-avatar { border-color: var(--accent-green); }
  .profile-david .profile-name { color: var(--accent-green); }

  /* ── SUBCATEGORY CARDS ── */
  .subcats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
    max-width: 900px;
    margin: 40px auto;
    animation: fadeUp 0.4s ease both;
  }
  .subcat-card {
    background: var(--bg-card);
    border: 2px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 36px 24px 28px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative; overflow: hidden;
    text-align: center;
  }
  .subcat-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    transition: opacity 0.3s;
  }
  .subcat-card::after {
    content: '';
    position: absolute; top: -50%; left: -50%;
    width: 200%; height: 200%;
    opacity: 0; transition: opacity 0.4s;
    pointer-events: none;
  }
  .subcat-card:hover {
    transform: translateY(-4px); box-shadow: var(--shadow);
  }
  .subcat-card:hover::after { opacity: 1; }
  .subcat-emoji-wrap {
    width: 64px; height: 64px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
    font-size: 30px;
    border: 2px solid var(--border);
    transition: all 0.3s;
  }
  .subcat-name { font-size: 19px; font-weight: 700; transition: color 0.3s; }
  .subcat-desc {
    font-size: 12px; color: var(--text-muted); margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  .subcat-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; margin-top: 10px;
    padding: 4px 12px; border-radius: 20px;
    display: inline-block;
  }

  /* Subcat colour variants */
  .subcat-blue { border-color: rgba(92,156,242,0.25); background: rgba(92,156,242,0.04); }
  .subcat-blue::before { background: linear-gradient(90deg, var(--accent-blue), transparent); opacity: 1; }
  .subcat-blue::after { background: radial-gradient(circle at 50% 0%, rgba(92,156,242,0.08), transparent 60%); }
  .subcat-blue:hover { border-color: var(--accent-blue); background: rgba(92,156,242,0.08); }
  .subcat-blue .subcat-emoji-wrap { background: var(--accent-blue-dim); border-color: rgba(92,156,242,0.3); }
  .subcat-blue:hover .subcat-emoji-wrap { border-color: var(--accent-blue); box-shadow: 0 0 20px rgba(92,156,242,0.2); }
  .subcat-blue .subcat-name { color: var(--accent-blue); }
  .subcat-blue .subcat-count { background: var(--accent-blue-dim); color: var(--accent-blue); }

  .subcat-gold { border-color: rgba(190,160,100,0.25); background: rgba(190,160,100,0.04); }
  .subcat-gold::before { background: linear-gradient(90deg, var(--accent-gold), transparent); opacity: 1; }
  .subcat-gold::after { background: radial-gradient(circle at 50% 0%, rgba(190,160,100,0.08), transparent 60%); }
  .subcat-gold:hover { border-color: var(--accent-gold); background: rgba(190,160,100,0.08); }
  .subcat-gold .subcat-emoji-wrap { background: var(--accent-gold-dim); border-color: rgba(190,160,100,0.3); }
  .subcat-gold:hover .subcat-emoji-wrap { border-color: var(--accent-gold); box-shadow: 0 0 20px rgba(190,160,100,0.2); }
  .subcat-gold .subcat-name { color: var(--accent-gold); }
  .subcat-gold .subcat-count { background: var(--accent-gold-dim); color: var(--accent-gold); }

  .subcat-pink { border-color: rgba(244,114,182,0.25); background: rgba(244,114,182,0.04); }
  .subcat-pink::before { background: linear-gradient(90deg, var(--accent-pink), transparent); opacity: 1; }
  .subcat-pink::after { background: radial-gradient(circle at 50% 0%, rgba(244,114,182,0.08), transparent 60%); }
  .subcat-pink:hover { border-color: var(--accent-pink); background: rgba(244,114,182,0.08); }
  .subcat-pink .subcat-emoji-wrap { background: var(--accent-pink-dim); border-color: rgba(244,114,182,0.3); }
  .subcat-pink:hover .subcat-emoji-wrap { border-color: var(--accent-pink); box-shadow: 0 0 20px rgba(244,114,182,0.2); }
  .subcat-pink .subcat-name { color: var(--accent-pink); }
  .subcat-pink .subcat-count { background: var(--accent-pink-dim); color: var(--accent-pink); }

  .subcat-green { border-color: rgba(61,214,140,0.25); background: rgba(61,214,140,0.04); }
  .subcat-green::before { background: linear-gradient(90deg, var(--accent-green), transparent); opacity: 1; }
  .subcat-green::after { background: radial-gradient(circle at 50% 0%, rgba(61,214,140,0.08), transparent 60%); }
  .subcat-green:hover { border-color: var(--accent-green); background: rgba(61,214,140,0.08); }
  .subcat-green .subcat-emoji-wrap { background: var(--accent-green-dim); border-color: rgba(61,214,140,0.3); }
  .subcat-green:hover .subcat-emoji-wrap { border-color: var(--accent-green); box-shadow: 0 0 20px rgba(61,214,140,0.2); }
  .subcat-green .subcat-name { color: var(--accent-green); }
  .subcat-green .subcat-count { background: var(--accent-green-dim); color: var(--accent-green); }

  .subcat-purple { border-color: rgba(167,139,250,0.25); background: rgba(167,139,250,0.04); }
  .subcat-purple::before { background: linear-gradient(90deg, var(--accent-purple), transparent); opacity: 1; }
  .subcat-purple::after { background: radial-gradient(circle at 50% 0%, rgba(167,139,250,0.08), transparent 60%); }
  .subcat-purple:hover { border-color: var(--accent-purple); background: rgba(167,139,250,0.08); }
  .subcat-purple .subcat-emoji-wrap { background: var(--accent-purple-dim); border-color: rgba(167,139,250,0.3); }
  .subcat-purple:hover .subcat-emoji-wrap { border-color: var(--accent-purple); box-shadow: 0 0 20px rgba(167,139,250,0.2); }
  .subcat-purple .subcat-name { color: var(--accent-purple); }
  .subcat-purple .subcat-count { background: var(--accent-purple-dim); color: var(--accent-purple); }

  .subcat-red { border-color: rgba(242,95,92,0.25); background: rgba(242,95,92,0.04); }
  .subcat-red::before { background: linear-gradient(90deg, var(--accent-red), transparent); opacity: 1; }
  .subcat-red::after { background: radial-gradient(circle at 50% 0%, rgba(242,95,92,0.08), transparent 60%); }
  .subcat-red:hover { border-color: var(--accent-red); background: rgba(242,95,92,0.08); }
  .subcat-red .subcat-emoji-wrap { background: var(--accent-red-dim); border-color: rgba(242,95,92,0.3); }
  .subcat-red:hover .subcat-emoji-wrap { border-color: var(--accent-red); box-shadow: 0 0 20px rgba(242,95,92,0.2); }
  .subcat-red .subcat-name { color: var(--accent-red); }
  .subcat-red .subcat-count { background: var(--accent-red-dim); color: var(--accent-red); }

  .subcat-cyan { border-color: rgba(34,211,238,0.25); background: rgba(34,211,238,0.04); }
  .subcat-cyan::before { background: linear-gradient(90deg, var(--accent-cyan), transparent); opacity: 1; }
  .subcat-cyan::after { background: radial-gradient(circle at 50% 0%, rgba(34,211,238,0.08), transparent 60%); }
  .subcat-cyan:hover { border-color: var(--accent-cyan); background: rgba(34,211,238,0.08); }
  .subcat-cyan .subcat-emoji-wrap { background: var(--accent-cyan-dim); border-color: rgba(34,211,238,0.3); }
  .subcat-cyan:hover .subcat-emoji-wrap { border-color: var(--accent-cyan); box-shadow: 0 0 20px rgba(34,211,238,0.2); }
  .subcat-cyan .subcat-name { color: var(--accent-cyan); }
  .subcat-cyan .subcat-count { background: var(--accent-cyan-dim); color: var(--accent-cyan); }

  .subcat-orange { border-color: rgba(245,158,11,0.25); background: rgba(245,158,11,0.04); }
  .subcat-orange::before { background: linear-gradient(90deg, var(--accent-orange), transparent); opacity: 1; }
  .subcat-orange::after { background: radial-gradient(circle at 50% 0%, rgba(245,158,11,0.08), transparent 60%); }
  .subcat-orange:hover { border-color: var(--accent-orange); background: rgba(245,158,11,0.08); }
  .subcat-orange .subcat-emoji-wrap { background: var(--accent-orange-dim); border-color: rgba(245,158,11,0.3); }
  .subcat-orange:hover .subcat-emoji-wrap { border-color: var(--accent-orange); box-shadow: 0 0 20px rgba(245,158,11,0.2); }
  .subcat-orange .subcat-name { color: var(--accent-orange); }
  .subcat-orange .subcat-count { background: var(--accent-orange-dim); color: var(--accent-orange); }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    margin-bottom: 20px;
    animation: fadeUp 0.3s ease both;
  }
  .search-box {
    flex: 1; min-width: 200px; max-width: 400px;
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 16px;
    color: var(--text-primary); font-family: 'Outfit', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent-blue); }
  .search-box::placeholder { color: var(--text-muted); }
  .filter-btn {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-secondary); padding: 10px 18px;
    border-radius: var(--radius-sm); cursor: pointer;
    font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent-blue-dim); border-color: var(--accent-blue);
    color: var(--accent-blue);
  }
  .btn-action {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-secondary); padding: 10px 16px;
    border-radius: var(--radius-sm); cursor: pointer;
    font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500;
    transition: all 0.2s; margin-left: auto;
  }
  .btn-action:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

  /* ── CATEGORY SECTIONS ── */
  .category { margin-top: 28px; animation: fadeUp 0.4s ease both; }
  .category-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
  }
  .category-icon {
    width: 36px; height: 36px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .category-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .category-count {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted);
    background: var(--bg-card); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 20px;
  }
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  /* ── TOOL CARD ── */
  .tool-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    cursor: pointer; transition: all 0.25s ease;
    position: relative; overflow: hidden;
    text-decoration: none; display: block;
  }
  .tool-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    opacity: 0; transition: opacity 0.25s;
  }
  .tool-card:hover {
    border-color: var(--border-hover); background: var(--bg-card-hover);
    transform: translateY(-2px); box-shadow: var(--shadow);
  }
  .tool-card:hover::before { opacity: 1; }
  .tool-card .card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .card-top-right { display: flex; align-items: center; gap: 6px; }
  .tool-card .tool-emoji { font-size: 28px; margin-bottom: 12px; }
  .btn-gear {
    width: 28px; height: 28px; border-radius: 6px;
    background: transparent; border: 1px solid transparent;
    color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; transition: all 0.2s; opacity: 0;
  }
  .tool-card:hover .btn-gear { opacity: 1; }
  .btn-gear:hover { background: var(--bg-input); border-color: var(--border); color: var(--text-secondary); }
  .tool-card .tool-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 500;
  }
  .status-ready { background: var(--accent-green-dim); color: var(--accent-green); }
  .status-wip { background: var(--accent-gold-dim); color: var(--accent-gold); }
  .status-planned { background: var(--bg-input); color: var(--text-muted); }
  .tool-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--text-primary); }
  .tool-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
  .tool-card .tool-tags { margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
  .tool-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 3px 8px;
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-muted);
  }

  /* ── CATEGORY COLOUR ACCENTS ── */
  .cat-gold .category-icon { background: var(--accent-gold-dim); }
  .cat-gold .category-title { color: var(--accent-gold); }
  .cat-gold .tool-card { background: rgba(190,160,100,0.06); border-color: rgba(190,160,100,0.18); }
  .cat-gold .tool-card:hover { background: rgba(190,160,100,0.12); border-color: rgba(190,160,100,0.35); }
  .cat-gold .tool-card::before { background: linear-gradient(90deg, var(--accent-gold), transparent); }

  .cat-blue .category-icon { background: var(--accent-blue-dim); }
  .cat-blue .category-title { color: var(--accent-blue); }
  .cat-blue .tool-card { background: rgba(92,156,242,0.06); border-color: rgba(92,156,242,0.18); }
  .cat-blue .tool-card:hover { background: rgba(92,156,242,0.12); border-color: rgba(92,156,242,0.35); }
  .cat-blue .tool-card::before { background: linear-gradient(90deg, var(--accent-blue), transparent); }

  .cat-green .category-icon { background: var(--accent-green-dim); }
  .cat-green .category-title { color: var(--accent-green); }
  .cat-green .tool-card { background: rgba(61,214,140,0.06); border-color: rgba(61,214,140,0.18); }
  .cat-green .tool-card:hover { background: rgba(61,214,140,0.12); border-color: rgba(61,214,140,0.35); }
  .cat-green .tool-card::before { background: linear-gradient(90deg, var(--accent-green), transparent); }

  .cat-red .category-icon { background: var(--accent-red-dim); }
  .cat-red .category-title { color: var(--accent-red); }
  .cat-red .tool-card { background: rgba(242,95,92,0.06); border-color: rgba(242,95,92,0.18); }
  .cat-red .tool-card:hover { background: rgba(242,95,92,0.12); border-color: rgba(242,95,92,0.35); }
  .cat-red .tool-card::before { background: linear-gradient(90deg, var(--accent-red), transparent); }

  .cat-purple .category-icon { background: var(--accent-purple-dim); }
  .cat-purple .category-title { color: var(--accent-purple); }

// ── PERSISTENCE ──
function loadData() {
  try {
    const saved = localStorage.getItem('familyToolkit_v3');
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
function saveData() { localStorage.setItem('familyToolkit_v3', JSON.stringify(DATA)); }

let DATA = loadData();
let nav = { profile: null, subcat: null };
let currentFilter = 'all';
let editingToolId = null;

// ── NAVIGATION ──
function goHome() { nav = { profile: null, subcat: null }; render(); }
function goProfile(id) { nav = { profile: id, subcat: null }; render(); }
function goSubcat(id) { nav.subcat = id; render(); }

// ── BREADCRUMB ──
function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = `<button class="crumb${!nav.profile ? ' active' : ''}" onclick="goHome()">🏠 Home</button>`;
  if (nav.profile) {
    const p = DATA.profiles.find(p => p.id === nav.profile);
    html += `<span class="crumb-sep">›</span>`;
    html += `<button class="crumb${!nav.subcat ? ' active' : ''}" onclick="goProfile('${p.id}')">${p.emoji} ${p.name}</button>`;
    if (nav.subcat) {
      const sc = p.subcategories.find(s => s.id === nav.subcat);
      html += `<span class="crumb-sep">›</span>`;
      html += `<button class="crumb active">${sc.emoji} ${sc.name}</button>`;
    }
  }
  bc.innerHTML = html;
}

// ── RENDER ──
function render() {
  renderBreadcrumb();
  const main = document.getElementById('mainContent');
  if (!nav.profile) return renderProfiles(main);
  if (!nav.subcat) return renderSubcats(main);
  renderTools(main);
}

function renderProfiles(main) {
  let html = '<div class="profiles-grid">';
  DATA.profiles.forEach(p => {
    const toolCount = DATA.tools.filter(t => t.profile === p.id).length;
    html += `<div class="profile-card profile-${p.id}" onclick="goProfile('${p.id}')">
      <div class="profile-avatar">${p.emoji}</div>
      <div class="profile-name">${p.name}</div>
      <div class="profile-sub">${toolCount} tools</div>
    </div>`;
  });
  html += '</div>';
  main.innerHTML = html;
}

function renderSubcats(main) {
  const profile = DATA.profiles.find(p => p.id === nav.profile);
  let html = '<div class="subcats-grid">';
  profile.subcategories.forEach(sc => {
    const toolCount = DATA.tools.filter(t => t.profile === nav.profile && t.subcat === sc.id).length;
    const colorClass = sc.color || profile.color;
    html += `<div class="subcat-card subcat-${colorClass}" onclick="goSubcat('${sc.id}')">
      <div class="subcat-emoji-wrap">${sc.emoji}</div>
      <div class="subcat-name">${sc.name}</div>
      ${sc.desc ? `<div class="subcat-desc">${sc.desc}</div>` : ''}
      <div class="subcat-count">${toolCount} tool${toolCount !== 1 ? 's' : ''}</div>
    </div>`;
  });
  html += '</div>';
  main.innerHTML = html;
}

function renderTools(main) {
  const profile = DATA.profiles.find(p => p.id === nav.profile);
  const subcat = profile.subcategories.find(s => s.id === nav.subcat);
  const search = document.getElementById('searchTools')?.value?.toLowerCase() || '';

  let html = `<div class="toolbar">
    <input class="search-box" type="text" placeholder="Search tools…" id="searchTools" oninput="render()" value="${search}">
    <button class="filter-btn ${currentFilter==='all'?'active':''}" onclick="currentFilter='all';render()">All</button>
    <button class="filter-btn ${currentFilter==='ready'?'active':''}" onclick="currentFilter='ready';render()">Ready</button>
    <button class="filter-btn ${currentFilter==='planned'?'active':''}" onclick="currentFilter='planned';render()">Planned</button>
  </div>`;

  subcat.categories.forEach(cat => {
    let tools = DATA.tools.filter(t => t.profile === nav.profile && t.subcat === nav.subcat && t.cat === cat.id);
    if (currentFilter !== 'all') tools = tools.filter(t => t.status === currentFilter);
    if (search) tools = tools.filter(t =>
      t.name.toLowerCase().includes(search) ||
      t.desc.toLowerCase().includes(search) ||
      t.tags.some(tag => tag.toLowerCase().includes(search))
    );

    html += `<section class="category cat-${cat.color}">
      <div class="category-header">
        <div class="category-icon">${cat.emoji}</div>
        <h2 class="category-title">${cat.name}</h2>
        <span class="category-count">${tools.length}</span>
      </div>
      <div class="tools-grid">`;

    tools.forEach(tool => {
      const statusClass = tool.status === 'ready' ? 'status-ready' : tool.status === 'wip' ? 'status-wip' : 'status-planned';
      const statusLabel = tool.status === 'ready' ? 'READY' : tool.status === 'wip' ? 'WIP' : 'PLANNED';
      const isLink = tool.link && (tool.link.startsWith('http') || tool.link.endsWith('.html'));
      const tag = isLink ? 'a' : 'div';
      const href = isLink ? ` href="${tool.link}" target="_blank"` : '';

      html += `<${tag} class="tool-card"${href}>
        <div class="card-top">
          <div class="tool-emoji">${tool.emoji}</div>
          <div class="card-top-right">
            <span class="tool-status ${statusClass}">${statusLabel}</span>
            <button class="btn-gear" onclick="event.preventDefault();event.stopPropagation();editTool('${tool.id}')" title="Edit tool">⚙</button>
          </div>
        </div>
        <h3>${tool.name}</h3>
        <p>${tool.desc}</p>
        <div class="tool-tags">${tool.tags.map(t => `<span class="tool-tag">${t}</span>`).join('')}</div>
      </${tag}>`;
    });

    html += `<div class="tool-card add-card" onclick="openAddTool('${cat.id}')">
        <div class="plus">+</div><span>Add tool</span>
      </div></div></section>`;
  });

  main.innerHTML = html;
}

// ── TOOL MODAL ──
function openModal() { document.getElementById('toolModal').classList.add('open'); }
function closeModal() { document.getElementById('toolModal').classList.remove('open'); editingToolId = null; }

function openAddTool(catId) {
  editingToolId = null;
  document.getElementById('modalTitle').textContent = 'Add New Tool';
  document.getElementById('btnDelete').classList.add('hidden');
  document.getElementById('fName').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fStatus').value = 'planned';
  document.getElementById('fLink').value = '';
  document.getElementById('fTags').value = '';
  document.getElementById('fEmoji').value = '🔧';
  updateCategorySelect();
  document.getElementById('fCat').value = catId;
  openModal();
}

function editTool(id) {
  const tool = DATA.tools.find(t => t.id === id);
  if (!tool) return;
  editingToolId = id;
  document.getElementById('modalTitle').textContent = 'Edit Tool';
  document.getElementById('btnDelete').classList.remove('hidden');
  document.getElementById('fName').value = tool.name;
  document.getElementById('fDesc').value = tool.desc;
  document.getElementById('fStatus').value = tool.status;
  document.getElementById('fLink').value = tool.link || '';
  document.getElementById('fTags').value = tool.tags.join(', ');
  document.getElementById('fEmoji').value = tool.emoji;
  updateCategorySelect();
  document.getElementById('fCat').value = tool.cat;
  openModal();
}

function saveTool() {
  const name = document.getElementById('fName').value.trim();
  if (!name) return alert('Name is required');
  const toolData = {
    profile: nav.profile,
    subcat: nav.subcat,
    cat: document.getElementById('fCat').value,
    name,
    desc: document.getElementById('fDesc').value.trim(),
    status: document.getElementById('fStatus').value,
    link: document.getElementById('fLink').value.trim(),
    tags: document.getElementById('fTags').value.split(',').map(t => t.trim()).filter(Boolean),
    emoji: document.getElementById('fEmoji').value || '🔧',
  };
  if (editingToolId) {
    const idx = DATA.tools.findIndex(t => t.id === editingToolId);
    if (idx >= 0) DATA.tools[idx] = { ...DATA.tools[idx], ...toolData };
  } else {
    toolData.id = 't' + Date.now();
    DATA.tools.push(toolData);
  }
  saveData();
  closeModal();
  render();
}

function deleteTool() {
  if (!editingToolId) return;
  if (!confirm('Delete this tool?')) return;
  DATA.tools = DATA.tools.filter(t => t.id !== editingToolId);
  saveData();
  closeModal();
  render();
}

function updateCategorySelect() {
  const sel = document.getElementById('fCat');
  if (!nav.profile || !nav.subcat) { sel.innerHTML = ''; return; }
  const profile = DATA.profiles.find(p => p.id === nav.profile);
  const subcat = profile.subcategories.find(s => s.id === nav.subcat);
  sel.innerHTML = subcat.categories.map(c => `<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');
}

// ── CLOCK ──
function updateClock() {
  const now = new Date();
  const london = now.toLocaleTimeString('en-GB', { timeZone: 'Europe/London', hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const chicago = now.toLocaleTimeString('en-US', { timeZone: 'America/Chicago', hour: '2-digit', minute: '2-digit', hour12: false });
  document.getElementById('clock').textContent = `🇬🇧 ${london}  ·  🇺🇸 ${chicago} CT`;
}
setInterval(updateClock, 1000);
updateClock();

// ── INIT ──
render();
</script>
</body>
</html>
